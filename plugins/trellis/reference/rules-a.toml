# The rows below select which rules are assembled into .trellis/internal/rules.md
# (each rule there ends with its row's slug). Edit, then run /trellis:setup (or
# the manual re-assembly path in the repo README) to apply — an edit here has
# no effect until that refresh re-assembles the readout.

seeded_from = "conductor"  # provenance only — the rows below win if they diverge
strictness  = "firm"  # firm (a·conductor) | adaptive (b·author-adapt)

[rules]  # one row per assessable catalog slug (signature-catalog-v1)
