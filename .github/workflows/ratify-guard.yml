name: ratify-guard

# decision-0042 (family lifecycle) + decision-0046 (approval is a human intent act):
# the mergeable state is `gated` — a decision/spec must not land on main still `draft`
# (downstream consumes only gated/approved upstream, never drafts). This fails a *ready*
# PR that leaves a draft. Draft PRs are exempt: marking a PR as draft is the sanctioned
# "keep it clearly WIP" escape.
#
# The old self-approval check (a *new* artifact must not arrive already `approved`) was
# RETIRED by decision-0046: the approval act is a human intent act, so an in-PR
# `gated → approved` flip that records a human approval is legitimate — merge is one way to
# perform it, not the only way. What remains here is only the draft-landing guard —
# decision-0042's still-standing "no draft on main" core. A family-wide *verifiable*
# approval guard is parked to grove#38, not this file.
#
# It checks only the files the PR touches (not pre-existing state elsewhere), so it
# catches the drift at the point it's introduced without failing on unrelated state.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

jobs:
  ratify-guard:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fail on a draft decision/spec in a ready PR
        run: |
          set -eu
          git fetch origin "${{ github.base_ref }}" --quiet
          changed="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'decisions/*.md' 'specs/*.md' || true)"
          bad=""
          for f in $changed; do
            [ -f "$f" ] || continue   # deleted in the PR
            if grep -q '^status: draft' "$f"; then bad="$bad $f"; fi
          done
          if [ -n "$bad" ]; then
            echo "::error::This PR is ready to merge but touches decisions/specs still marked 'status: draft'."
            echo "merge=ratify (decision-0042): flip them to 'gated' in this PR, or convert the PR to a draft to keep them WIP."
            for f in $bad; do echo "  · $f"; done
            exit 1
          fi
          echo "ok — no draft decision/spec left in this ready PR"
